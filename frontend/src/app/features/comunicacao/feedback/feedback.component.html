<ion-content class="bg-gray-50">
  <div class="w-full max-w-md mx-auto bg-gray-50 min-h-screen relative pb-10" [formGroup]="feedbackForm">
    <!-- Cabeçalho -->
    <header class="bg-white px-4 py-4 flex items-center shadow-sm sticky top-0 z-10 border-b border-gray-100">
      <button (click)="voltar()" class="text-gray-500 p-1"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg></button>
      <div class="ml-2"><h1 class="text-lg font-bold">Feedback do Sistema</h1></div>
    </header>

    <main class="p-5 space-y-6">
      <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl p-5 text-white shadow-md">
        <h2 class="text-base font-bold mb-1">O que você está achando?</h2>
        <p class="text-xs text-blue-100 leading-relaxed">Encontrou um erro ou tem uma ideia? Mande direto para a equipe!</p>
      </div>

      <div class="space-y-6">
        <div>
          <label class="block text-xs font-bold text-gray-700 mb-3 uppercase">Como podemos ajudar?</label>
          <div class="grid grid-cols-3 gap-2">
            <!-- Opções Radio -->
            <label class="cursor-pointer">
              <input type="radio" formControlName="tipo" value="BUG" class="peer sr-only">
              <div class="flex flex-col items-center p-3 rounded-xl border bg-gray-50 peer-checked:bg-red-50 peer-checked:border-red-500 peer-checked:text-red-700">
                <span class="text-xs font-bold">Relatar Erro</span>
              </div>
            </label>
            <label class="cursor-pointer">
              <input type="radio" formControlName="tipo" value="SUGESTAO" class="peer sr-only">
              <div class="flex flex-col items-center p-3 rounded-xl border bg-gray-50 peer-checked:bg-emerald-50 peer-checked:border-emerald-500 peer-checked:text-emerald-700">
                <span class="text-xs font-bold">Sugestão</span>
              </div>
            </label>
            <label class="cursor-pointer">
              <input type="radio" formControlName="tipo" value="DUVIDA" class="peer sr-only">
              <div class="flex flex-col items-center p-3 rounded-xl border bg-gray-50 peer-checked:bg-blue-50 peer-checked:border-blue-500 peer-checked:text-blue-700">
                <span class="text-xs font-bold">Dúvida</span>
              </div>
            </label>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-700 mb-2 uppercase">Sua Mensagem</label>
          <textarea formControlName="comentario" rows="5" class="w-full px-4 py-3 bg-white border border-gray-200 rounded-xl text-sm" placeholder="Descreva aqui..."></textarea>
        </div>

        <button (click)="enviar()" [disabled]="isSending || feedbackForm.invalid" class="w-full bg-gray-900 text-white font-bold py-4 rounded-xl">
          {{ isSending ? 'Enviando...' : 'ENVIAR PARA DESENVOLVEDOR' }}
        </button>
      </div>
    </main>
  </div>
</ion-content>
