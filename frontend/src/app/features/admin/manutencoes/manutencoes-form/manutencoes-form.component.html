<ion-content class="bg-gray-50">
  <div class="w-full max-w-md mx-auto bg-white min-h-screen relative pb-10 shadow-sm border-x border-gray-800">
    
    <header class="bg-white px-4 py-4 flex items-center shadow-sm sticky top-0 z-10 border-b border-gray-200">
      <button (click)="voltar()" class="text-gray-500 hover:text-gray-900 focus:outline-none p-1 -ml-1 transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
      </button>
      <div class="ml-2">
        <h1 class="text-lg font-bold text-gray-800 leading-tight">{{ isEditMode ? 'Editar' : 'Nova' }} Rotina</h1>
        <p class="text-xs text-gray-500 font-medium">Manutenção Preventiva</p>
      </div>
    </header>

    <main class="p-6">
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
        
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">Descrição do Serviço *</label>
          <input type="text" formControlName="descricaoServico" 
                 [ngClass]="{'border-red-500 bg-red-50': temErro('descricaoServico'), 'border-gray-300': !temErro('descricaoServico')}"
                 class="w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" 
                 placeholder="Ex: Limpeza da caixa d'água">
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">Periodicidade (Meses) *</label>
          <input type="number" formControlName="periodicidadeMeses" min="1"
                 [ngClass]="{'border-red-500 bg-red-50': temErro('periodicidadeMeses'), 'border-gray-300': !temErro('periodicidadeMeses')}"
                 class="w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" 
                 placeholder="Ex: 6">
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">Data da Última Execução *</label>
          <input type="date" formControlName="dataUltimaExecucao" 
                 [ngClass]="{'border-red-500 bg-red-50': temErro('dataUltimaExecucao'), 'border-gray-300': !temErro('dataUltimaExecucao')}"
                 class="w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none bg-white">
        </div>

        <button type="submit" [disabled]="isSubmitting" 
                class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white font-bold py-4 rounded-xl shadow-md transition-all mt-6">
          {{ isSubmitting ? 'Salvando...' : (isEditMode ? 'Atualizar Rotina' : 'Cadastrar Rotina') }}
        </button>
      </form>
    </main>

  </div>
</ion-content>
