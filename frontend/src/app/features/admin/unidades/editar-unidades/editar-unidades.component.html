<ion-content class="bg-gray-50">
  <div class="w-full max-w-md mx-auto bg-gray-50 min-h-screen relative pb-10">
    
    <header class="bg-white px-4 py-4 flex items-center shadow-sm sticky top-0 z-10 border-b border-gray-800">
      <button (click)="voltar()" type="button" class="text-gray-500 hover:text-gray-900 focus:outline-none p-1 -ml-1 transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
        </svg>
      </button>
      <div class="ml-2">
        <h1 class="text-lg font-bold text-gray-800 leading-tight">Configurar Unidade</h1>
        <p class="text-xs text-gray-500 font-medium">Unidade: {{ numeroUnidade }}</p>
      </div>
    </header>

    <div *ngIf="isLoading" class="text-center py-20">
      <svg class="animate-spin h-8 w-8 text-blue-600 mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      <p class="text-sm text-gray-400 mt-2 font-medium">Buscando informações da unidade...</p>
    </div>

    <main *ngIf="!isLoading" class="p-5">
      <form [formGroup]="unidadeForm" (ngSubmit)="onSubmit()" class="space-y-5">
        
        <div class="bg-gray-100 rounded-xl p-4 border border-gray-100 flex items-center justify-between">
          <span class="text-sm font-semibold text-gray-500">Identificação Estrutural</span>
          <span class="text-base font-extrabold text-gray-800">APARTAMENTO {{ numeroUnidade }}</span>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
          <label class="block text-sm font-bold text-gray-700 mb-2">Status de Ocupação</label>
          <div class="relative">
            <select formControlName="statusOcupacao"
              class="w-full px-4 py-3 bg-gray-50 border border-gray-500 rounded-xl focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition-all text-gray-800 font-medium appearance-none cursor-pointer">
              <option value="" disabled>Selecione o status...</option>
              <option value="PROPRIETARIO">PROPRIETÁRIO</option>
              <option value="INQUILINO">INQUILINO</option>
              <option value="VAZIO">VAZIO (DESOCUPADO)</option>
            </select>
            <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-gray-500">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </div>
          </div>
          <p *ngIf="unidadeForm.get('statusOcupacao')?.touched && unidadeForm.get('statusOcupacao')?.invalid" class="text-xs text-red-500 mt-1">O status de ocupação é obrigatório.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
          <label class="block text-sm font-bold text-gray-700 mb-2">Vaga de Garagem Vinculada</label>
          <input formControlName="vagaGaragem" type="text" placeholder="Ex: Vaga 01 - Térreo"
            class="w-full px-4 py-3 bg-gray-50 border border-gray-500 rounded-xl focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition-all text-gray-800 font-medium" />
          <p class="text-xs text-gray-400 mt-2">Identificação física da vaga correspondente à fração ideal.</p>
        </div>

        <div class="pt-4 space-y-3">
          <button type="submit" [disabled]="isSaving"
            class="w-full bg-blue-600 text-white font-bold text-base py-4 rounded-xl hover:bg-blue-700 active:scale-95 shadow-lg shadow-blue-600/20 transition-all flex justify-center items-center gap-2">
            <svg *ngIf="!isSaving" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            {{ isSaving ? 'SALVANDO ALTERAÇÕES...' : 'SALVAR ALTERAÇÕES' }}
          </button>

          <button (click)="voltar()" type="button" [disabled]="isSaving"
            class="w-full bg-white text-gray-600 border border-gray-500 font-bold py-3.5 rounded-xl transition-all active:bg-gray-100 flex justify-center items-center">
            CANCELAR
          </button>
        </div>

      </form>
    </main>
  </div>
</ion-content>
