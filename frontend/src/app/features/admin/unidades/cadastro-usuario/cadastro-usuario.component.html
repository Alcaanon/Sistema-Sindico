<ion-content class="bg-gray-50">
  <div class="w-full max-w-md mx-auto bg-white min-h-screen relative pb-10 shadow-sm border-x border-gray-800">
    
    <header class="bg-white px-4 py-4 flex items-center shadow-sm sticky top-0 z-10 border-b border-gray-200">
      <button (click)="voltar()" class="text-gray-500 hover:text-gray-900 focus:outline-none p-1 -ml-1 transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
        </svg>
      </button>
      <div class="ml-2">
        <h1 class="text-lg font-bold text-gray-800 leading-tight">Novo Acesso</h1>
        <p class="text-xs text-gray-500 font-medium">Cadastrar {{ perfilDefinido === 'MORADOR' ? 'Morador' : 'Usuário' }}</p>
      </div>
    </header>

    <main class="p-6">
      <form [formGroup]="cadastroForm" (ngSubmit)="onSubmit()" class="space-y-5">
        
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">Nome Completo *</label>
          <input type="text" formControlName="nomeCompleto" 
                 [ngClass]="{'border-red-500 bg-red-50': temErro('nomeCompleto'), 'border-gray-300': !temErro('nomeCompleto')}"
                 class="w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors outline-none" 
                 placeholder="Ex: João da Silva">
          <span *ngIf="temErro('nomeCompleto')" class="text-[11px] font-medium text-red-500 mt-1 block">O nome é obrigatório (mín. 3 caracteres).</span>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">CPF *</label>
            <input type="tel" formControlName="cpf" maxlength="11" 
                   [ngClass]="{'border-red-500 bg-red-50': temErro('cpf'), 'border-gray-300': !temErro('cpf')}"
                   class="w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors outline-none" 
                   placeholder="Apenas números">
            <span *ngIf="temErro('cpf')" class="text-[11px] font-medium text-red-500 mt-1 block">11 dígitos necessários.</span>
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">WhatsApp *</label>
            <input type="tel" formControlName="whatsapp" 
                   [ngClass]="{'border-red-500 bg-red-50': temErro('whatsapp'), 'border-gray-300': !temErro('whatsapp')}"
                   class="w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors outline-none" 
                   placeholder="Ex: 11999999999">
          </div>
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">E-mail *</label>
          <input type="email" formControlName="email" 
                 [ngClass]="{'border-red-500 bg-red-50': temErro('email'), 'border-gray-300': !temErro('email')}"
                 class="w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors outline-none" 
                 placeholder="joao@email.com">
          <span *ngIf="temErro('email')" class="text-[11px] font-medium text-red-500 mt-1 block">Digite um e-mail válido.</span>
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">Vincular Unidade *</label>
          <select formControlName="unidadeNumero" 
                  [ngClass]="{'border-red-500 bg-red-50': temErro('unidadeNumero'), 'border-gray-300': !temErro('unidadeNumero')}"
                  class="w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors outline-none bg-white">
            <option value="" disabled selected>Selecione a unidade</option>
            <option *ngFor="let und of unidadesDisponiveis" [value]="und.numero">{{ und.numero }}</option>
            
            <option *ngIf="unidadesDisponiveis.length === 0" value="APTO_101">APTO_101 (Exemplo)</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">Senha de Acesso Provisória *</label>
          <input type="password" formControlName="senha" 
                 [ngClass]="{'border-red-500 bg-red-50': temErro('senha'), 'border-gray-300': !temErro('senha')}"
                 class="w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors outline-none" 
                 placeholder="Mínimo de 6 caracteres">
        </div>

        <p *ngIf="temErro('aceiteLgpd')" class="text-[11px] font-bold text-red-500 text-center -mt-2">Você deve confirmar o aceite da LGPD.</p>

        <button type="submit" [disabled]="isSubmitting" 
                class="w-full bg-emerald-600 hover:bg-emerald-700 disabled:bg-emerald-400 disabled:cursor-not-allowed text-white font-bold py-4 rounded-xl shadow-md transition-all mt-6 flex justify-center items-center gap-2">
          
          <svg *ngIf="isSubmitting" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          
          <span>{{ isSubmitting ? 'Cadastrando...' : 'Finalizar Cadastro' }}</span>
        </button>
      </form>
    </main>

  </div>
</ion-content>
